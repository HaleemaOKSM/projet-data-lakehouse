version: "3.8"

networks:
  lakehouse-net:
    driver: bridge

volumes:
  minio_data:
  postgres_hive_data:

services:

  # ─────────────────────────────────────────
  # 1. MinIO — Stockage objet S3
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    hostname: minio
    networks:
      - lakehouse-net
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # 2. MinIO Init — crée les buckets au démarrage
  # ─────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    networks:
      - lakehouse-net
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/lakehouse;
      mc mb --ignore-existing local/lakehouse/bronze;
      mc mb --ignore-existing local/lakehouse/silver;
      mc mb --ignore-existing local/lakehouse/gold;
      mc mb --ignore-existing local/lakehouse/raw;
      echo 'Buckets créés avec succès';
      "

  # ─────────────────────────────────────────
  # 3. PostgreSQL — Base de métadonnées Hive
  # ─────────────────────────────────────────
  mysql-hive:
    image: mysql:8
    container_name: mysql-hive
    environment:
      MYSQL_DATABASE: metastore_db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    networks:
      - lakehouse-net
    volumes:
      - postgres_hive_data:/var/lib/mysql 
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  # ─────────────────────────────────────────
  # 4. Hive Metastore — Catalogue des tables
  # ─────────────────────────────────────────
  hive-metastore:
    image: bitsondatadev/hive-metastore:latest
    container_name: hive-metastore
    hostname: hive-metastore
    networks:
      - lakehouse-net
    ports:
      - "9083:9083"
    depends_on:
      mysql-hive:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      METASTORE_DB_HOSTNAME: mysql-hive
      METASTORE_DB_PORT: 3306
      METASTORE_DB_NAME: metastore_db
      METASTORE_DB_USER: ${MYSQL_USER}
      METASTORE_DB_PASSWORD: ${MYSQL_PASSWORD}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PATH_STYLE_ACCESS: "true"
    volumes:
      - ./hive/conf/hive-site.xml:/opt/apache-hive-metastore-3.0.0-bin/conf/hive-site.xml
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9083"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────
  # 5. Trino — Moteur SQL distribué
  # ─────────────────────────────────────────
  trino:
    image: trinodb/trino:435
    container_name: trino
    hostname: trino
    networks:
      - lakehouse-net
    ports:
      - "8080:8080"
    depends_on:
      hive-metastore:
        condition: service_healthy
    volumes:
      - ./trino/catalog:/etc/trino/catalog
      - ./trino/config/config.properties:/etc/trino/config.properties
      - ./trino/config/jvm.config:/etc/trino/jvm.config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────
  # 6. Apache Spark — Traitements Big Data
  # ─────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    hostname: spark-master
    networks:
      - lakehouse-net
    ports:
      - "8081:8080"
      - "7077:7077"
    environment:
      - SPARK_WORKER_MEMORY=3g
      - SPARK_DRIVER_MEMORY=2g
      - SPARK_EXECUTOR_MEMORY=2g
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    hostname: spark-worker
    networks:
      - lakehouse-net
    depends_on:
      - spark-master
    environment:
      - SPARK_WORKER_MEMORY=3g
      - SPARK_EXECUTOR_MEMORY=2g
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data
  # ─────────────────────────────────────────
  # 7. Apache Superset — Visualisation BI
  # ─────────────────────────────────────────
  superset:
    image: apache/superset:3.1.0
    container_name: superset
    hostname: superset
    networks:
      - lakehouse-net
    ports:
      - "8088:8088"
    depends_on:
      - trino
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: admin@lakehouse.com
    command: >
      /bin/sh -c "
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Admin --lastname User --email admin@lakehouse.com --password admin123 &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088
      "